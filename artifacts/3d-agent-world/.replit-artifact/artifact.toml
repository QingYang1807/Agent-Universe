kind = "web"
previewPath = "/"
title = "Multi-Agent 3D Community"
version = "1.0.0"
id = "artifacts/3d-agent-world"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25698

[services.development]
run = "pnpm --filter @workspace/3d-agent-world run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/3d-agent-world", "run", "build" ]
publicDir = "artifacts/3d-agent-world/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25698"
BASE_PATH = "/"
